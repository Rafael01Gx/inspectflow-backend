services:

  postgres:
    image: postgres:18-alpine
    container_name: inspectflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: inspectflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - inspectflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5


  mongodb:
    image: mongo:8
    container_name: inspectflow-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_pass
      MONGO_INITDB_DATABASE: inspectflow
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    #  - ./docker/mongodb/init:/docker-entrypoint-initdb.d
    networks:
      - inspectflow-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/inspectflow --quiet
      interval: 10s
      timeout: 5s
      retries: 5


  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: inspectflow-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@inspectflow.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - inspectflow-network
    depends_on:
      - postgres

  mongo-express:
    image: mongo-express:latest
    container_name: inspectflow-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin_pass
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin_pass@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    ports:
      - "8081:8081"
    networks:
      - inspectflow-network
    depends_on:
      - mongodb

volumes:
  postgres_data:
    driver: local
    name: inspectflow_postgres_data
  mongodb_data:
    driver: local
    name: inspectflow_mongodb_data
  mongodb_config:
    driver: local
    name: inspectflow_mongodb_config
  pgadmin_data:
    driver: local
    name: inspectflow_pgadmin_data

networks:
  inspectflow-network:
    driver: bridge
    name: inspectflow-network